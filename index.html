<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>我的投資組合</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; }
  .title { font-size: 20px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 8px; }
  .api-tags { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .api-tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 1px solid #ddd; color: #666; background: #fff; }
  .add-bar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .add-bar input, .add-bar select { height: 36px; padding: 0 10px; font-size: 13px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; }
  .add-bar input.sym { width: 90px; text-transform: uppercase; }
  .add-bar input.num { width: 85px; }
  .add-bar select { width: 110px; }
  .btn { height: 36px; padding: 0 14px; font-size: 13px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; font-size: 12px; color: #888; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .dot.live { background: #1D9E75; animation: pulse 2s infinite; }
  .dot.loading { background: #f59e0b; }
  .dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #eee; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .pos { color: #1D9E75; }
  .neg { color: #ef4444; }
  .stocks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(195px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 14px 16px; }
  .card.alert-on { border-left: 3px solid #f59e0b; border-radius: 0 12px 12px 0; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .sym-text { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .name-text { font-size: 11px; color: #888; margin-top: 2px; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; margin-left: 4px; }
  .badge-us { background: #dbeafe; color: #1e40af; }
  .badge-tw { background: #dcfce7; color: #166534; }
  .badge-loading { background: #f3f4f6; color: #9ca3af; }
  .remove-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; line-height: 1; padding: 0; }
  .remove-btn:hover { color: #ef4444; }
  .price-text { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
  .change-text { font-size: 13px; font-weight: 500; }
  .detail-text { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.9; }
  .alert-row { display: flex; align-items: center; gap: 5px; margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
  .alert-row label { font-size: 11px; color: #888; white-space: nowrap; }
  .alert-row input { flex: 1; height: 28px; padding: 0 8px; font-size: 11px; border-radius: 6px; border: 1px solid #ddd; min-width: 0; }
  .chart-wrap { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 16px; margin-bottom: 1.25rem; }
  .chart-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .chart-label { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .ctrl-group { display: flex; gap: 6px; align-items: center; }
  .range-btn { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 6px; border: 1px solid #ddd; background: #f5f5f5; color: #666; cursor: pointer; }
  .range-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .sel { height: 28px; padding: 0 8px; font-size: 12px; border-radius: 6px; border: 1px solid #ddd; background: #fff; }
  .log-wrap { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 16px; }
  .log-title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
  .log-item { font-size: 12px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; color: #666; display: flex; gap: 10px; align-items: baseline; }
  .log-item:last-child { border-bottom: none; }
  .log-time { font-size: 11px; color: #bbb; white-space: nowrap; }
  .chip { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 99px; font-weight: 600; }
  .chip-pos { background: #dcfce7; color: #166534; }
  .chip-neg { background: #fee2e2; color: #991b1b; }
  .muted { font-size: 12px; color: #bbb; }
  @media (max-width: 600px) {
    .add-bar input.sym { width: 80px; }
    .add-bar input.num { width: 75px; }
    .add-bar select { width: 100px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div>
      <div class="title">📈 我的投資組合</div>
      <div class="api-tags">
        <span class="api-tag">🇺🇸 Alpha Vantage</span>
        <span class="api-tag">🇹🇼 Fugle</span>
      </div>
    </div>
    <div class="add-bar">
      <input id="inSym" class="sym" placeholder="代號" maxlength="8" />
      <input id="inShares" class="num" type="number" placeholder="股數" min="0.01" step="any" />
      <input id="inCost" class="num" type="number" placeholder="成本價" min="0.01" step="any" />
      <select id="inMarket">
        <option value="US">🇺🇸 美股</option>
        <option value="TW">🇹🇼 台股</option>
      </select>
      <button class="btn btn-primary" onclick="addStock()">＋ 新增</button>
      <button class="btn" onclick="refreshAll()">↻ 更新</button>
    </div>
  </div>

  <div class="status-bar">
    <span class="dot" id="sDot"></span>
    <span id="sTxt">初始化中...</span>
  </div>

  <div class="summary-grid" id="summaryGrid"></div>
  <div class="stocks-grid" id="stocksGrid"></div>

  <div class="chart-wrap">
    <div class="chart-controls">
      <div class="ctrl-group">
        <span class="chart-label">走勢圖</span>
        <select class="sel" id="chartSym" onchange="renderChart()"></select>
      </div>
      <div class="ctrl-group">
        <button class="range-btn active" onclick="setRange(7,this)">1W</button>
        <button class="range-btn" onclick="setRange(30,this)">1M</button>
        <button class="range-btn" onclick="setRange(90,this)">3M</button>
      </div>
    </div>
    <div style="position:relative;height:220px">
      <canvas id="stockChart"></canvas>
    </div>
  </div>

  <div class="log-wrap">
    <div class="log-title">🔔 提醒紀錄</div>
    <div id="alertsLog"><span class="muted">尚無提醒觸發紀錄</span></div>
  </div>

</div>

<script>
const AV_KEY     = 'X8BAQKWEVVJAP7DX';
const FUGLE_KEY  = 'OTY2MGZhMGItNWFkZS00NmIxLTgxYzAtZjU4NWRhZTU3ZmEzIDliM2UzMTNkLTlhZWQtNGM3ZS04MDQzLTg0OWQ3OTdjMjk2Zg==';
const AV_BASE    = 'https://www.alphavantage.co/query';
const FUGLE_BASE = 'https://api.fugle.tw/marketdata/v1.0/stock/intraday/quote';

let portfolio  = JSON.parse(localStorage.getItem('portfolio') || 'null') || [];
let alertsLog  = JSON.parse(localStorage.getItem('alertsLog') || '[]');
let chartRange = 7;
let chartInst  = null;
let usQueue    = [];
let twQueue    = [];
let isFetching = false;
let avCalls    = 0;

const DEFAULTS = [
  {symbol:'TSLA', name:'Tesla',  market:'US', shares:10,  cost:180},
  {symbol:'AAPL', name:'Apple',  market:'US', shares:5,   cost:150},
  {symbol:'2330', name:'台積電', market:'TW', shares:100, cost:650},
  {symbol:'2317', name:'鴻海',   market:'TW', shares:200, cost:105},
];

function save(){
  try {
    localStorage.setItem('portfolio', JSON.stringify(portfolio.map(s=>({symbol:s.symbol,name:s.name,market:s.market,shares:s.shares,cost:s.cost,alert:s.alert||null}))));
    localStorage.setItem('alertsLog', JSON.stringify(alertsLog));
  } catch(e){}
}

function setStatus(type, msg){
  document.getElementById('sDot').className = 'dot ' + type;
  document.getElementById('sTxt').textContent = msg;
}

async function fetchUSPrice(symbol){
  const res  = await fetch(`${AV_BASE}?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${AV_KEY}`);
  const data = await res.json();
  if(data.Note || data.Information) throw new Error('rate_limit');
  const q = data['Global Quote'];
  if(!q || !q['05. price']) throw new Error('no_data');
  avCalls++;
  return { price:parseFloat(q['05. price']), prev:parseFloat(q['08. previous close']), high:parseFloat(q['03. high']), low:parseFloat(q['04. low']) };
}

async function fetchTWPrice(symbol){
  const res  = await fetch(`${FUGLE_BASE}/${symbol}`, { headers:{'X-API-KEY':FUGLE_KEY} });
  if(!res.ok) throw new Error('fugle_error');
  const data = await res.json();
  if(!data.lastPrice && !data.closePrice) throw new Error('no_data');
  return { price:data.lastPrice||data.closePrice||data.referencePrice, prev:data.previousClose||data.referencePrice, high:data.highPrice, low:data.lowPrice };
}

async function fetchUSHistory(symbol, days){
  const res  = await fetch(`${AV_BASE}?function=TIME_SERIES_DAILY&symbol=${symbol}&outputsize=${days>30?'full':'compact'}&apikey=${AV_KEY}`);
  const data = await res.json();
  if(data.Note||data.Information) return null;
  const ts = data['Time Series (Daily)']; if(!ts) return null;
  avCalls++;
  return Object.keys(ts).sort().slice(-days).map(d=>({date:d.slice(5),price:parseFloat(ts[d]['4. close'])}));
}

async function fetchTWHistory(symbol, days){
  const to=new Date(), from=new Date(); from.setDate(from.getDate()-days-10);
  const fmt=d=>d.toISOString().slice(0,10);
  const res=await fetch(`https://api.fugle.tw/marketdata/v1.0/stock/historical/candles/${symbol}?resolution=D&from=${fmt(from)}&to=${fmt(to)}&fields=close`,{headers:{'X-API-KEY':FUGLE_KEY}});
  if(!res.ok) return null;
  const data=await res.json();
  if(!data.candles) return null;
  return data.candles.slice(-days).map(c=>({date:c.date.slice(5),price:c.close}));
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function processUSQueue(){
  while(usQueue.length > 0){
    const {symbol,idx} = usQueue.shift();
    setStatus('loading',`取得美股 ${symbol}... (今日 AV ${avCalls} 次)`);
    try {
      const d = await fetchUSPrice(symbol);
      Object.assign(portfolio[idx], d, {loaded:true,error:false});
      save(); renderCards(); renderSummary(); checkAlerts();
    } catch(e){
      if(e.message==='rate_limit'){ setStatus('error','Alpha Vantage 達速率限制，請稍後再更新'); usQueue=[]; break; }
      portfolio[idx].error=true; renderCards();
    }
    if(usQueue.length>0) await sleep(13000);
  }
}

async function processTWQueue(){
  for(const {symbol,idx} of twQueue){
    setStatus('loading',`取得台股 ${symbol} (Fugle)...`);
    try {
      const d = await fetchTWPrice(symbol);
      Object.assign(portfolio[idx], d, {loaded:true,error:false});
      save(); renderCards(); renderSummary(); checkAlerts();
    } catch(e){ portfolio[idx].error=true; renderCards(); }
    await sleep(300);
  }
  twQueue=[];
}

async function refreshAll(){
  if(isFetching){ setStatus('loading','更新中，請稍候...'); return; }
  isFetching=true;
  portfolio.forEach(s=>{ s.loaded=false; s.error=false; });
  renderCards();
  usQueue=portfolio.map((s,i)=>({symbol:s.symbol,idx:i})).filter((_,i)=>portfolio[i].market==='US');
  twQueue=portfolio.map((s,i)=>({symbol:s.symbol,idx:i})).filter((_,i)=>portfolio[i].market==='TW');
  await Promise.all([processUSQueue(), processTWQueue()]);
  isFetching=false;
  setStatus('live',`全部更新完成 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} | AV ${avCalls} 次`);
  renderChart();
}

function fmtP(p,m){ return m==='TW'?'NT$'+Number(p).toLocaleString('zh-TW',{minimumFractionDigits:1,maximumFractionDigits:1}):'$'+Number(p).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPct(v){ return (v>=0?'+':'')+Number(v).toFixed(2)+'%'; }
function fmtV(v,m){ return m==='TW'?'NT$'+Math.round(v).toLocaleString():'$'+Math.round(v).toLocaleString(); }
function chg(s){ return s.prev?((s.price-s.prev)/s.prev*100):0; }

function renderSummary(){
  const loaded=portfolio.filter(s=>s.loaded);
  if(!loaded.length){ document.getElementById('summaryGrid').innerHTML=''; return; }
  let val=0,cost=0,day=0;
  loaded.forEach(s=>{ val+=s.price*s.shares; cost+=s.cost*s.shares; day+=(s.price-s.prev)*s.shares; });
  const gain=val-cost, gPct=cost?(gain/cost*100):0, base=val-day, dPct=base?(day/base*100):0;
  document.getElementById('summaryGrid').innerHTML=`
    <div class="metric"><div class="metric-label">總市值</div><div class="metric-value">≈ $${Math.round(val).toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">總損益</div><div class="metric-value ${gain>=0?'pos':'neg'}">${gain>=0?'+':'−'}$${Math.round(Math.abs(gain)).toLocaleString()} (${fmtPct(gPct)})</div></div>
    <div class="metric"><div class="metric-label">今日損益</div><div class="metric-value ${day>=0?'pos':'neg'}">${day>=0?'+':'−'}$${Math.round(Math.abs(day)).toLocaleString()} (${fmtPct(dPct)})</div></div>
    <div class="metric"><div class="metric-label">持股</div><div class="metric-value">${portfolio.length} 檔</div></div>`;
}

function renderCards(){
  document.getElementById('stocksGrid').innerHTML=portfolio.map((s,i)=>{
    if(!s.loaded&&!s.error) return `<div class="card" style="opacity:.6"><div class="card-header"><div><div class="sym-text">${s.symbol}<span class="badge badge-loading">取得中</span></div><div class="name-text">${s.name||s.symbol}</div></div></div><div class="price-text" style="color:#ccc">—</div><div class="detail-text">連線 ${s.market==='TW'?'Fugle':'Alpha Vantage'}...</div></div>`;
    if(s.error) return `<div class="card"><div class="card-header"><div><div class="sym-text">${s.symbol}</div><div class="name-text">${s.name||s.symbol}</div></div><button class="remove-btn" onclick="removeStock(${i})">✕</button></div><div style="font-size:12px;color:#ef4444">⚠ 無法取得資料</div><div class="detail-text">請確認代號是否正確</div></div>`;
    const c=chg(s),pnl=(s.price-s.cost)*s.shares,pnlPct=(s.price-s.cost)/s.cost*100,alertOn=s.alert&&Math.abs(c)>=s.alert;
    return `<div class="card ${alertOn?'alert-on':''}">
      <div class="card-header">
        <div><div class="sym-text">${s.symbol}<span class="badge ${s.market==='TW'?'badge-tw':'badge-us'}">${s.market==='TW'?'🇹🇼':'🇺🇸'}</span></div><div class="name-text">${s.name||s.symbol}</div></div>
        <button class="remove-btn" onclick="removeStock(${i})">✕</button>
      </div>
      <div class="price-text">${fmtP(s.price,s.market)}</div>
      <div class="change-text ${c>=0?'pos':'neg'}">${c>=0?'▲':'▼'} ${fmtPct(c)} 今日</div>
      <div class="detail-text">
        持股 ${s.shares} 股 ｜ 成本 ${fmtP(s.cost,s.market)}<br>
        市值 ${fmtV(s.price*s.shares,s.market)}<br>
        損益 <span class="${pnl>=0?'pos':'neg'}">${pnl>=0?'+':'−'}${fmtV(Math.abs(pnl),s.market)} (${fmtPct(pnlPct)})</span>
        ${s.high?`<br>H ${fmtP(s.high,s.market)} / L ${fmtP(s.low,s.market)}`:''}
      </div>
      <div class="alert-row">
        <span style="font-size:14px">${alertOn?'🔔':'🔕'}</span>
        <label>提醒漲跌 ≥</label>
        <input type="number" min="0.1" step="0.1" placeholder="%" value="${s.alert||''}" onchange="setAlert(${i},this.value)" />
        <span style="font-size:11px;color:#bbb">%</span>
      </div>
    </div>`;
  }).join('');
  const sel=document.getElementById('chartSym'),cur=sel.value;
  sel.innerHTML=portfolio.filter(s=>s.loaded).map(s=>`<option value="${s.symbol}" ${s.symbol===cur?'selected':''}>${s.symbol} ${s.market==='TW'?'🇹🇼':'🇺🇸'}</option>`).join('');
}

function checkAlerts(){
  portfolio.filter(s=>s.loaded&&s.alert).forEach(s=>{
    const c=chg(s);
    if(Math.abs(c)>=s.alert){ alertsLog.unshift({time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),symbol:s.symbol,change:c,price:s.price,market:s.market}); if(alertsLog.length>20) alertsLog.pop(); }
  });
  save();
  const el=document.getElementById('alertsLog');
  if(!alertsLog.length){ el.innerHTML='<span class="muted">尚無提醒觸發紀錄</span>'; return; }
  el.innerHTML=alertsLog.map(a=>`<div class="log-item"><span class="log-time">${a.time}</span><span><b>${a.symbol}</b> 漲跌 <span class="chip ${a.change>=0?'chip-pos':'chip-neg'}">${fmtPct(a.change)}</span> 現價 ${fmtP(a.price,a.market)}</span></div>`).join('');
}

function setAlert(i,val){ portfolio[i].alert=parseFloat(val)||null; save(); checkAlerts(); renderCards(); }

function removeStock(i){ portfolio.splice(i,1); save(); renderSummary(); renderCards(); renderChart(); }

function addStock(){
  const sym=document.getElementById('inSym').value.trim().toUpperCase();
  const shares=parseFloat(document.getElementById('inShares').value);
  const cost=parseFloat(document.getElementById('inCost').value);
  const market=document.getElementById('inMarket').value;
  if(!sym||!shares||!cost){ alert('請填寫股票代號、股數和成本價'); return; }
  if(portfolio.find(s=>s.symbol===sym)){ alert('此股票已在清單中'); return; }
  const entry={symbol:sym,name:sym,market,shares,cost,price:cost,prev:cost*.98,loaded:false,error:false,alert:null};
  portfolio.push(entry);
  document.getElementById('inSym').value=''; document.getElementById('inShares').value=''; document.getElementById('inCost').value='';
  save(); renderCards();
  const idx=portfolio.length-1;
  if(market==='US'){ usQueue.push({symbol:sym,idx}); if(!isFetching) processUSQueue(); }
  else { twQueue.push({symbol:sym,idx}); if(!isFetching) processTWQueue(); }
}

function setRange(d,btn){ chartRange=d; document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderChart(); }

function genFakePts(s,days){
  let p=s.price*(1-(days/365)*.1);
  return Array.from({length:days},(_,i)=>{ p=p*(1+(Math.random()-.48)*.022); const d=new Date(); d.setDate(d.getDate()-(days-1-i)); return {date:d.toISOString().slice(5,10),price:parseFloat(p.toFixed(s.market==='TW'?1:2))}; }).concat([{date:'今日',price:s.price}]);
}

async function renderChart(){
  const sym=document.getElementById('chartSym').value;
  const s=portfolio.find(p=>p.symbol===sym);
  if(!s||!s.loaded) return;
  let pts;
  if(s.market==='US'){ const h=await fetchUSHistory(sym,chartRange); pts=h||genFakePts(s,chartRange); }
  else { const h=await fetchTWHistory(sym,chartRange); pts=h||genFakePts(s,chartRange); }
  const labels=pts.map(p=>p.date), data=pts.map(p=>parseFloat(Number(p.price).toFixed(2)));
  const isPos=data[data.length-1]>=data[0], col=isPos?'#1D9E75':'#ef4444', fill=isPos?'rgba(29,158,117,0.09)':'rgba(239,68,68,0.09)';
  if(chartInst) chartInst.destroy();
  chartInst=new Chart(document.getElementById('stockChart'),{
    type:'line',
    data:{labels,datasets:[{label:sym,data,borderColor:col,backgroundColor:fill,borderWidth:2,pointRadius:data.length>30?0:3,tension:0.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const p=ctx.parsed.y; return s.market==='TW'?'NT$'+p.toFixed(1):'$'+p.toFixed(2);}}}},scales:{x:{ticks:{color:'#999',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{display:false}},y:{ticks:{color:'#999',font:{size:10},callback:v=>s.market==='TW'?'NT$'+v:'$'+v},grid:{color:'rgba(0,0,0,0.05)'}}}}
  });
}

async function init(){
  if(portfolio.length===0){
    DEFAULTS.forEach(d=>portfolio.push({...d,price:d.cost,prev:d.cost*.98,loaded:false,error:false,alert:null}));
  } else {
    portfolio.forEach(s=>{ s.loaded=false; s.error=false; s.price=s.cost; s.prev=s.cost*.98; });
  }
  renderCards(); renderSummary();
  setStatus('loading','同時連線 Alpha Vantage（美股）與 Fugle（台股）...');
  usQueue=portfolio.map((s,i)=>({symbol:s.symbol,idx:i})).filter((_,i)=>portfolio[i].market==='US');
  twQueue=portfolio.map((s,i)=>({symbol:s.symbol,idx:i})).filter((_,i)=>portfolio[i].market==='TW');
  isFetching=true;
  await Promise.all([processUSQueue(), processTWQueue()]);
  isFetching=false;
  setStatus('live',`全部載入完成 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} | AV ${avCalls} 次`);
  renderChart();
}

init();
</script>
</body>
</html>
